apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: frontend
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: frontend
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: frontend
    spec:
      # nosemgrep: yaml.kubernetes.security.run-as-non-root.run-as-non-root
      # Deliberately not setting runAsNonRoot here: the official nginx:alpine image's
      # master process must start as root to bind port 80 (a privileged port), then
      # drops to the unprivileged nginx user (UID 101) internally on its own.
      # allowPrivilegeEscalation:false and capabilities drop:ALL (with only the specific
      # capabilities nginx needs added back) still apply, see container securityContext below.
      containers:
        - image: frontend
          imagePullPolicy: Never
          name: frontend
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
                - CHOWN
                - SETUID
                - SETGID
      restartPolicy: Always
