name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build API image
        run: docker build -t api:latest ./app/api

      - name: Build frontend image
        run: docker build -t frontend:latest ./app/frontend
