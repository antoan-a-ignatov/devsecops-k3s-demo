name: CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}/api
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend
jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  sast:
    needs: detect-secrets
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run Semgrep
        run: semgrep ci --config auto --exclude-rule yaml.kubernetes.security.run-as-non-root.run-as-non-root
  build-and-push:
    needs: sast
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./app/api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ github.sha }}
      - name: Build and push frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./app/frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
  scan-images:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Scan API image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
      - name: Scan database image (non-blocking, see README)
        continue-on-error: true
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: postgres:16-alpine
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
  deploy:
    needs: scan-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Open K3s API access for this run
        working-directory: ./terraform
        run: |
          echo '{"k3s_api_cidrs": ["0.0.0.0/0"]}' > k3s_api_cidrs.auto.tfvars.json
          terraform init
          terraform apply -auto-approve

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Wait for instance boot
        run: |
          INSTANCE_IP=$(cd terraform && terraform output -raw instance_public_ip)
          for i in $(seq 1 10); do
            aws ssm get-parameter --name "/k3s-demo/kubeconfig" --region eu-north-1 --with-decryption --query "Parameter.Value" --output text > /tmp/kubeconfig
            KUBECONFIG_IP=$(grep server /tmp/kubeconfig | grep -oP '(?<=https://)[^:]+')
            if [ "$KUBECONFIG_IP" != "$INSTANCE_IP" ]; then
              echo "Kubeconfig still has old IP ($KUBECONFIG_IP), waiting for new instance ($INSTANCE_IP)... ($i/10)"
              sleep 15
              continue
            fi
            kubectl --kubeconfig=/tmp/kubeconfig --request-timeout=10s get nodes && break
            echo "Waiting for K3s API to become ready... ($i/10)"
            sleep 15
          done

      - name: Debug security group state
        run: |
          aws ec2 describe-security-groups --filters "Name=group-name,Values=k3s-demo-sg" --query "SecurityGroups[0].IpPermissions" --output json

      - name: Deploy to K3s
        run: |
          aws ssm get-parameter --name "/k3s-demo/kubeconfig" --region eu-north-1 --with-decryption --query "Parameter.Value" --output text > /tmp/kubeconfig
          KUBECONFIG=/tmp/kubeconfig kubectl apply --request-timeout=120s -f k8s/

      - name: Tighten K3s API access after deploy
        working-directory: ./terraform
        if: always()
        run: |
          echo '{"k3s_api_cidrs": ["127.0.0.1/32"]}' > k3s_api_cidrs.auto.tfvars.json
          terraform apply -auto-approve
